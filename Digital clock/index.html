<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Izunwanne Victor A.E" />
    <meta name="description" content="A digital clock" />

    <title>Digital Clock</title>

    <link rel="stylesheet" href="styles/styles.css" />
    <script src="scripts/index.js" defer></script>
  </head>
  <body>
    <p>Digital clock</p>

    <div class="clock">
      <div class="time">
        <div class="hour">
          <div class="hour-1">-</div>
          <div class="hour-2">-</div>
        </div>

        <div class="blinking-column">:</div>

        <div class="minute">
          <div class="minute-1">-</div>
          <div class="minute-2">-</div>
        </div>

        <div class="blinking-column">:</div>

        <div class="second">
          <div class="second-1">-</div>
          <div class="second-2">-</div>
        </div>
      </div>

      <div class="date">
        <div class="day">27</div>
        <div class="month">May</div>
        <div class="year">2007</div>
      </div>

      <div class="set-time-and-date">
        <p>Set time and date manually</p>
      </div>
    </div>

    <div class="button">
      <button type="button" class="start-timer">Start timer</button>
    </div>
  </body>
</html>
